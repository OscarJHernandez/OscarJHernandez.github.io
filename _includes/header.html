<header class="site-hero" role="banner">
  <div class="site-hero-inner">
    <h1 class="site-hero-title">
      <span class="site-title">{{ site.username }}</span>
      {% if site.user_title != nil and site.user_title != "" %}
      <span class="site-description">{{ site.user_title }}</span>
      {% endif %}
    </h1>
    <div class="header-icons">
      <a aria-label="Send email" href="mailto:{{ site.email }}"><i class="icon fa fa-envelope" aria-hidden="true"></i></a>
      <a aria-label="LinkedIn" target="_blank" rel="noopener noreferrer" href="https://www.linkedin.com/in/oscar-javier-hernandez/"><i class="icon fa fa-linkedin" aria-hidden="true"></i></a>
      <a aria-label="GitHub" target="_blank" rel="noopener noreferrer" href="https://github.com/OscarJHernandez/"><i class="icon fa fa-github-alt" aria-hidden="true"></i></a>
    </div>
    <nav class="header-links" aria-label="Primary">
      <a class="link" href="{{ site.baseurl }}/#about">About</a>
      <a class="link" href="{{ site.baseurl }}/resume/">CV</a>
    </nav>
  </div>
</header>
